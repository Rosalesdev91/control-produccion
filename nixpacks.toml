# nixpacks.toml
# Ubicación: C:\xampp\htdocs\control_produccion\nixpacks.toml

[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.mysqli",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.gd",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.session"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public public/router.php"
